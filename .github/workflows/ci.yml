name: CI

# Enforces the project's coding standards on every push and pull request.
# All Cargo commands run inside the `rust/` folder, where the Cargo project lives.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch/PR to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Treat all warnings as errors so clippy/rustc lints block the build.
  RUSTFLAGS: "-D warnings"

defaults:
  run:
    working-directory: rust

jobs:
  # Formatting, linting, and tests: the core "code quality" gate.
  quality:
    name: Format, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features

      - name: Run tests
        run: cargo test --all-features

  # Code coverage: ensures program logic is actually exercised by tests.
  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage report
        # Fail the build if line coverage drops below the threshold.
        # Tighten this number over time as coverage grows.
        run: cargo llvm-cov --all-features --fail-under-lines 80 --lcov --output-path lcov.info

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: rust/lcov.info

  # Supply-chain security: known vulnerabilities, license, and source checks.
  supply-chain:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: cargo-audit (RustSec advisory DB)
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: rust

      - name: cargo-deny (advisories, bans, licenses, sources)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: rust/Cargo.toml

  # Continuous deployment: build the backend image and roll it out to the Azure
  # Container App. Runs only on pushes to main, and only after the two gates that
  # actually protect production have passed: all tests (quality) and the security
  # audit (supply-chain). The coverage job still runs on every push as a quality
  # signal, but a coverage percentage is intentionally not allowed to block a
  # deploy.
  deploy:
    name: Build & Deploy to Azure
    runs-on: ubuntu-latest
    needs: [quality, supply-chain]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # CD steps operate on the whole repo (the Dockerfile lives at the root), not
    # the rust/ subfolder the other jobs default to.
    defaults:
      run:
        working-directory: .
    # OIDC: request a federated token for azure/login; no client secret stored.
    permissions:
      id-token: write
      contents: read
    environment:
      name: production
      url: https://${{ steps.deploy.outputs.fqdn }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure containerapp CLI extension
        run: az extension add --name containerapp --upgrade --only-show-errors

      - name: Build & push image in ACR
        # ACR Tasks builds the image server-side and pushes it, so the runner
        # needs no Docker. Tag with the commit SHA (immutable) and latest.
        run: |
          az acr build \
            --registry "${{ vars.ACR_NAME }}" \
            --image "${{ vars.IMAGE_NAME }}:${{ github.sha }}" \
            --image "${{ vars.IMAGE_NAME }}:latest" \
            --file Dockerfile .

      - name: Deploy image to Container App
        id: deploy
        run: |
          az containerapp update \
            --name "${{ vars.CONTAINERAPP_NAME }}" \
            --resource-group "${{ vars.RESOURCE_GROUP }}" \
            --image "${{ vars.ACR_NAME }}.azurecr.io/${{ vars.IMAGE_NAME }}:${{ github.sha }}"
          fqdn=$(az containerapp show \
            --name "${{ vars.CONTAINERAPP_NAME }}" \
            --resource-group "${{ vars.RESOURCE_GROUP }}" \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "fqdn=$fqdn" >> "$GITHUB_OUTPUT"
          echo "Deployed to https://$fqdn"

      - name: Smoke test /healthz
        run: |
          for i in $(seq 1 30); do
            if curl -fsS "https://${{ steps.deploy.outputs.fqdn }}/healthz" >/dev/null; then
              echo "healthz OK"; exit 0
            fi
            echo "waiting for new revision... ($i)"; sleep 5
          done
          echo "healthz did not become ready in time"; exit 1
