# Build the Gaia PWA and deploy it to Azure Static Web Apps.
#
# WHY THIS EXISTS
# ---------------
# Vite inlines every `VITE_*` variable into the JavaScript bundle **at build
# time**. The sign-in providers shown by the app are gated purely on those
# inlined values (web/src/lib/config.ts):
#   - VITE_GOOGLE_CLIENT_ID -> Google button
#   - VITE_GITHUB_CLIENT_ID -> GitHub button
#
# Azure Static Web Apps serves a *pre-built* static site, so values set in the
# SWA portal under "Configuration / Application settings" are NEVER injected into
# the frontend bundle (they only reach the managed API). The variables therefore
# have to be present in THIS workflow's build step, which is what this file does.
#
# REQUIRED CONFIGURATION (add these in the repo's Settings)
# ---------------------------------------------------------
# Repository *Variables* (Settings -> Secrets and variables -> Actions -> Variables)
# — these are public client identifiers that ship to the browser, so a Variable
# (not a Secret) is appropriate:
#   - VITE_GITHUB_CLIENT_ID   GitHub OAuth/App client id (e.g. Ov23...).
#   - VITE_GOOGLE_CLIENT_ID   Google OAuth web client id.
#   - VITE_API_BASE           Absolute base URL of the deployed Gaia backend,
#                             e.g. https://gaia.<region>.azurecontainerapps.io
#                             (leave unset for same-origin).
#   - VITE_STREAM_TRANSPORT   Optional: "ws" (default) or "post".
#
# Repository *Secret*:
#   - AZURE_STATIC_WEB_APPS_API_TOKEN   The deployment token from your Static Web
#                             App (portal -> your SWA -> "Manage deployment token").
#                             If you already have a token secret with a different
#                             name, update the reference below to match.
#
# SEPARATELY (not part of this workflow):
#   - The deployed BACKEND must have GITHUB_CLIENT_ID + GITHUB_CLIENT_SECRET set
#     (the OAuth code exchange happens server-side, in rust/src/auth.rs).
#   - The GitHub OAuth/App "Authorization callback URL" must include your SWA
#     origin (e.g. https://<your-app>.azurestaticapps.net/).

name: Deploy web to Azure Static Web Apps

on:
  push:
    branches: [main]
    # Only rebuild the site when the web app (or this workflow) changes.
    paths:
      - 'web/**'
      - '.github/workflows/web-swa-deploy.yml'
  # Allow manual redeploys (e.g. after changing a VITE_* variable).
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_and_deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      # Build ourselves so we fully control the VITE_* env the bundle is compiled
      # with. The deploy action below then just uploads the finished output
      # (skip_app_build: true), which avoids relying on Oryx to forward env vars.
      - name: Build PWA
        working-directory: web
        env:
          VITE_GITHUB_CLIENT_ID: ${{ vars.VITE_GITHUB_CLIENT_ID }}
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
          VITE_STREAM_TRANSPORT: ${{ vars.VITE_STREAM_TRANSPORT }}
        run: |
          npm ci
          npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          # The app is already built above; point at the output and skip rebuild.
          app_location: 'web/build'
          output_location: ''
          api_location: ''
          skip_app_build: true
